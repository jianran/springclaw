# Spring Configuration
spring:
  datasource:
    url: jdbc:h2:mem:springclaw;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-key-here}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

# SpringClaw Configuration
springclaw:
  agents:
    assistant:
      name: "Basic Assistant"
      description: "A simple AI assistant with web search and file reading capabilities"
      system-prompt: |
        You are a helpful AI assistant. Be concise and accurate.
        If you need to search for current information, use the web_search tool.
        If you need to read files, use the file_read tool.
      model:
        provider: openai
        model-id: gpt-4o
        temperature: 0.7
      tools:
        allow: ["web_search", "web_fetch", "file_read", "session"]
        deny: []
      memory:
        type: in-memory
        max-messages: 50
  gateway:
    port: 8080
    web-channel-enabled: true
  memory:
    type: in-memory
    max-messages: 50

